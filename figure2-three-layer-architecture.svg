<svg xmlns="http://www.w3.org/2000/svg" width="920" height="700" viewBox="0 0 920 700" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- ===================== LAYER 1 — RAW SOURCES ===================== -->
  <rect x="40" y="40" width="840" height="140" rx="12" fill="#eef2f7" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="60" y="70" font-size="16" font-weight="bold" fill="#1e293b">Layer 1 — Raw sources</text>
  <text x="860" y="70" font-size="11.5" font-style="italic" fill="#64748b" text-anchor="end">Owned by you · immutable · the agent only reads</text>

  <!-- chips -->
  <g font-size="13" font-weight="bold" fill="#1e293b">
    <!-- chip 1 -->
    <rect x="60"  y="90" width="145" height="74" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="132.5" y="124" text-anchor="middle">PDFs</text>
    <text x="132.5" y="144" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#64748b">papers, decks</text>
    <!-- chip 2 -->
    <rect x="224" y="90" width="145" height="74" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="296.5" y="124" text-anchor="middle">Markdown</text>
    <text x="296.5" y="144" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#64748b">docs, notes</text>
    <!-- chip 3 -->
    <rect x="388" y="90" width="145" height="74" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="460.5" y="124" text-anchor="middle">GitHub PRs</text>
    <text x="460.5" y="144" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#64748b">commits, diffs</text>
    <!-- chip 4 -->
    <rect x="552" y="90" width="145" height="74" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="624.5" y="124" text-anchor="middle">Meeting notes</text>
    <text x="624.5" y="144" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#64748b">transcripts</text>
    <!-- chip 5 -->
    <rect x="716" y="90" width="144" height="74" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="788" y="124" text-anchor="middle">Slide decks</text>
    <text x="788" y="144" text-anchor="middle" font-size="10.5" font-weight="normal" fill="#64748b">presentations</text>
  </g>

  <!-- ===================== LLM AGENT ===================== -->
  <rect x="355" y="255" width="210" height="86" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="460" y="290" font-size="16" font-weight="bold" fill="#1e3a8a" text-anchor="middle">LLM agent</text>
  <text x="460" y="312" font-size="11.5" fill="#1e40af" text-anchor="middle">Claude Code / backend</text>
  <text x="460" y="328" font-size="11" fill="#1d4ed8" text-anchor="middle">ingest · query · lint</text>

  <!-- reads: Layer 1 -> agent (two converging arrows) -->
  <line x1="395" y1="180" x2="430" y2="253" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="525" y1="180" x2="490" y2="253" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="460" y="218" font-size="11.5" fill="#475569" text-anchor="middle" font-style="italic">reads</text>

  <!-- writes: agent -> Layer 2 -->
  <line x1="420" y1="343" x2="300" y2="423" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="332" y="388" font-size="11.5" fill="#475569" text-anchor="middle" font-style="italic">writes</text>

  <!-- governs: Layer 3 -> agent (dashed) -->
  <line x1="730" y1="423" x2="540" y2="338" stroke="#8b5cf6" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowDashed)"/>
  <text x="648" y="388" font-size="11.5" fill="#7c3aed" text-anchor="middle" font-style="italic">governs</text>

  <!-- ===================== LAYER 2 — WIKI ===================== -->
  <rect x="40" y="425" width="520" height="245" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="60" y="453" font-size="16" font-weight="bold" fill="#065f46">Layer 2 — Wiki</text>
  <text x="60" y="472" font-size="11.5" font-style="italic" fill="#047857">Owned by the agent · you read, it writes</text>

  <g font-size="12.5" font-weight="bold" fill="#065f46" text-anchor="middle">
    <!-- row 1 -->
    <rect x="60"  y="486" width="149" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="134.5" y="508">index.md</text>
    <rect x="225" y="486" width="149" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="299.5" y="508">log.md</text>
    <rect x="390" y="486" width="150" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="465" y="508">_gaps.md</text>
    <!-- row 2 -->
    <rect x="60"  y="528" width="149" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="134.5" y="550">_overview.md</text>
    <rect x="225" y="528" width="149" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="299.5" y="550">_reuse.md</text>
    <rect x="390" y="528" width="150" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="465" y="550">entities/</text>
    <!-- row 3 -->
    <rect x="60"  y="570" width="149" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="134.5" y="592">decisions/</text>
    <rect x="225" y="570" width="149" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="299.5" y="592">concepts/</text>
    <rect x="390" y="570" width="150" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="465" y="592">meetings/</text>
    <!-- row 4 -->
    <rect x="60"  y="612" width="149" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="134.5" y="634">deliverables/</text>
    <rect x="225" y="612" width="149" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="299.5" y="634">generator/</text>
    <rect x="390" y="612" width="150" height="34" rx="7" fill="#ffffff" stroke="#a7f3d0"/><text x="465" y="634">queries/</text>
  </g>

  <!-- ===================== LAYER 3 — SCHEMA ===================== -->
  <rect x="600" y="425" width="280" height="245" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="620" y="453" font-size="16" font-weight="bold" fill="#5b21b6">Layer 3 — Schema</text>
  <text x="620" y="472" font-size="11.5" font-style="italic" fill="#6d28d9">Co-evolved by you and the agent</text>

  <rect x="640" y="500" width="200" height="110" rx="10" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="740" y="545" font-size="17" font-weight="bold" fill="#5b21b6" text-anchor="middle">CLAUDE.md</text>
  <text x="740" y="570" font-size="11" fill="#6d28d9" text-anchor="middle">page templates</text>
  <text x="740" y="588" font-size="11" fill="#6d28d9" text-anchor="middle">operation workflows</text>
  <text x="740" y="606" font-size="11" fill="#6d28d9" text-anchor="middle">cross-ref conventions</text>
  <text x="740" y="646" font-size="11" fill="#6d28d9" text-anchor="middle">the single per-project config</text>
</svg>
